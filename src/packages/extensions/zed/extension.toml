id = "closedcode"
name = "closedcode"
description = "Local-only AI coding agent."
version = "1.14.33"
schema_version = 1
authors = ["informanellica"]
repository = "https://github.com/informanellica/vanilla-closedcode"

[agent_servers.closedcode]
name = "closedcode"
icon = "./icons/closedcode.svg"

[agent_servers.closedcode.targets.darwin-aarch64]
archive = "https://github.com/informanellica/vanilla-closedcode/releases/download/v1.14.33/closedcode-darwin-arm64.zip"
cmd = "./closedcode"
args = ["acp"]

[agent_servers.closedcode.targets.darwin-x86_64]
archive = "https://github.com/informanellica/vanilla-closedcode/releases/download/v1.14.33/closedcode-darwin-x64.zip"
cmd = "./closedcode"
args = ["acp"]

[agent_servers.closedcode.targets.linux-aarch64]
archive = "https://github.com/informanellica/vanilla-closedcode/releases/download/v1.14.33/closedcode-linux-arm64.tar.gz"
cmd = "./closedcode"
args = ["acp"]

[agent_servers.closedcode.targets.linux-x86_64]
archive = "https://github.com/informanellica/vanilla-closedcode/releases/download/v1.14.33/closedcode-linux-x64.tar.gz"
cmd = "./closedcode"
args = ["acp"]

[agent_servers.closedcode.targets.windows-x86_64]
archive = "https://github.com/informanellica/vanilla-closedcode/releases/download/v1.14.33/closedcode-windows-x64.zip"
cmd = "./closedcode.exe"
args = ["acp"]
