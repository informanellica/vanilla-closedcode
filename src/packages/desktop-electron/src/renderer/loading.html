<!doctype html>
<html lang="en" style="background-color: var(--background-base, #f7f7f7)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vanilla-closedcode</title>
    <link rel="icon" type="image/png" href="./favicon-96x96-v3.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./favicon-v3.svg" />
    <link rel="shortcut icon" href="./favicon-v3.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-v3.png" />
    <meta name="theme-color" content="#F8F7F7" />
    <meta name="theme-color" content="#131010" media="(prefers-color-scheme: dark)" />
    <meta property="og:image" content="./social-share.png" />
    <meta property="twitter:image" content="./social-share.png" />
    <script id="vcc-theme-preload-script" src="./vcc-theme-preload.js"></script>
    <!-- Runtime env (replaces Vite's import.meta.env). Build-less renderer (Stage C). -->
    <script>
      globalThis.process = globalThis.process || {
        env: { NODE_ENV: "production" },
        platform: "browser",
        argv: [],
        version: "",
        versions: {},
        cwd: function () { return "/"; },
        nextTick: function (f) { queueMicrotask(f); },
      };
      window.__APP_ENV__ = {
        MODE: "production",
        DEV: false,
        PROD: true,
        CLOSEDCODE_CHANNEL: "prod",
        VITE_CLOSEDCODE_CHANNEL: "prod",
        VITE_SENTRY_DSN: "",
        VITE_SENTRY_RELEASE: "",
        VITE_SENTRY_ENVIRONMENT: "",
        VITE_BUILD_ID: "dev",
      };
    </script>
    <!-- Bootstrap 5 (vendored) + app utilities for Tailwind-valued classes -->
    <link rel="stylesheet" href="./vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body class="antialiased overscroll-none text-12-regular overflow-hidden" style="margin: 0">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- Startup splash, rendered STATICALLY with inline styles so it appears even
         if app.css, the import map or the reactive runtime fail to load. This is
         the surface that must survive a broken renderer the most, so it owns no
         framework dependency. loading.js only updates the status text and the
         progress fill width, then signals completion. -->
    <div
      id="root"
      style="width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--background-base, #f7f7f7)"
    >
      <div style="display: flex; flex-direction: column; align-items: center; gap: 2.75rem">
        <img src="./favicon-v3.svg" alt="" width="80" height="100" style="opacity: 0.15" />
        <div
          style="display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 15rem"
          aria-live="polite"
        >
          <span
            id="loading-status"
            style="width: 100%; overflow: hidden; text-align: center; text-overflow: ellipsis; white-space: nowrap; color: var(--text-strong, #1a1a1a); font-size: 14px"
            >Just a moment...</span
          >
          <div
            role="progressbar"
            aria-label="Database migration progress"
            style="width: 5rem; height: 4px; overflow: hidden; background: var(--surface-weak, #e5e5e5)"
          >
            <div
              id="loading-progress"
              style="height: 100%; width: 25%; background: var(--icon-warning-base, #e0a000); transition: width 0.2s ease"
            ></div>
          </div>
        </div>
      </div>
    </div>
    <script src="./loading.js" type="module"></script>
  </body>
</html>
