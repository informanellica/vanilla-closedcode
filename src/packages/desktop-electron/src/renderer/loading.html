<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vanilla-closedcode</title>
    <link rel="icon" type="image/png" href="./favicon-96x96-v3.png" sizes="96x96" />
    <meta name="theme-color" content="#F8F7F7" />
    <meta name="theme-color" content="#131010" media="(prefers-color-scheme: dark)" />
    <!-- The startup splash is fully self-contained: no external stylesheet and no
         preload script, so a missing/broken app.css, bootstrap.css, import map or
         reactive runtime cannot white it out or block first paint. Colors follow
         the OS color scheme; the BrowserWindow backgroundColor (set in main) uses
         the same values, so there is no white flash before this paints. -->
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background-color: #f8f7f7;
        color: #1a1a1a;
      }
      #loading-track { background: #e6e4e3; }
      /* The brand mark is solid (not a faint 0.2 ghost that reads as blank on
         a near-white background) and gently pulses, so the splash is always
         visibly "alive" while loading. Pure CSS — no JS/rAF, which keeps it
         working even when first paint races a busy cold start. */
      #loading-logo { opacity: 0.92; animation: loading-pulse 1.6s ease-in-out infinite; }
      @keyframes loading-pulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 0.95; }
      }
      @media (prefers-color-scheme: dark) {
        body { background-color: #131010; color: #ededed; }
        #loading-track { background: #2a2624; }
      }
      @media (prefers-reduced-motion: reduce) {
        #loading-logo { animation: none; opacity: 0.92; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" style="width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 2.75rem">
        <!-- Brand mark (Bootstrap c-square), inlined so it never 404s as an <img>. -->
        <svg
          id="loading-logo"
          viewBox="0 0 16 16"
          width="80"
          height="80"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M8.146 4.992c-1.212 0-1.927.92-1.927 2.502v1.06c0 1.571.703 2.462 1.927 2.462.979 0 1.641-.586 1.729-1.418h1.295v.093c-.1 1.448-1.354 2.467-3.03 2.467-2.091 0-3.269-1.336-3.269-3.603V7.482c0-2.261 1.201-3.638 3.27-3.638 1.681 0 2.935 1.054 3.029 2.572v.088H9.875c-.088-.879-.768-1.512-1.729-1.512"
          ></path>
          <path
            d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm15 0a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1z"
          ></path>
        </svg>
        <div
          style="display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 15rem"
          aria-live="polite"
        >
          <span
            id="loading-status"
            style="width: 100%; overflow: hidden; text-align: center; text-overflow: ellipsis; white-space: nowrap; font-size: 14px"
            >Just a moment...</span
          >
          <div
            id="loading-track"
            role="progressbar"
            aria-label="Database migration progress"
            style="width: 5rem; height: 4px; overflow: hidden; border-radius: 1px"
          >
            <div
              id="loading-progress"
              style="height: 100%; width: 25%; background: #e0a000; transition: width 0.2s ease"
            ></div>
          </div>
        </div>
      </div>
    </div>
    <script src="./loading.js" type="module"></script>
  </body>
</html>
